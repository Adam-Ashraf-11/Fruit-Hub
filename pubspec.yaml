name: e_commerce_app
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1
environment:
  sdk: ^3.11.4
dependencies:
  cloud_firestore: ^5.5.0
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  dots_indicator: ^4.0.1
  firebase_auth: ^5.3.3
  firebase_core: 3.8.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_facebook_auth: ^7.1.6
  flutter_localizations:
    sdk: flutter
  flutter_svg_provider: ^1.0.7
  gap: ^3.0.1
  get_it: ^9.2.1
  google_sign_in: 6.2.1
  modal_progress_hud_nsn: ^0.5.1
  shared_preferences: ^2.5.5
  sign_in_with_apple: ^7.0.1
  snackify: ^1.2.4
  svg_flutter: ^0.0.1

dev_dependencies:
  flutter_launcher_icons: "^0.14.4"
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
flutter:
  uses-material-design: true
  assets:
    - assets/image/svg/
    - assets/image/icons/
    - assets/image/navigation_appbar/bold/
    - assets/image/navigation_appbar/outline/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/image/icons/FruitHub.png"
  min_sdk_android: 21

flutter_assets:
  assets_path: assets/image
  output_path: lib/core/utils
  filename: app_images.dart
  field_prefix: null
flutter_intl:
  enabled: true